name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *' # daily ~06:00 Europe/Oslo (cron is UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; don't clobber a scheduled run with a push run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `prebuild` fetches Sanity + generates events.json and feeds. It exits non-zero on an
      # empty/failed fetch, which fails this job so the deploy is skipped and the last good
      # site stays live. BASE_PATH must match the Pages project path.
      - name: Build (fetch + typecheck + bundle)
        env:
          BASE_PATH: /pride-cal/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
